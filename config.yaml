# Ollama Smart Router 配置文件

# 模型配置
models:
  # 小模型 - 用于简单任务 (GPU)
  small:
    name: "gemma3:4b"
    vram_gb: 3.0

  # 中模型 - 用于中等任务 (CPU)
  medium:
    name: "qwen2.5:7b"
    vram_gb: 6.0

  # 大模型 - 用于复杂任务 (CPU Fallback)
  large:
    name: "llama3.2:8b"
    vram_gb: 7.0

# GPU阈值配置
gpu_thresholds:
  # 空闲显存低于此值转CPU
  min_free_vram_gb: 4.0
  # 安全余量 (GB)，路由时会加上此余量判断显存是否足够
  safety_margin_gb: 1.0

# 云端API配置 (可选)
cloud:
  # API密钥 - 建议通过环境变量设置: export DEEPSEEK_API_KEY='your-key'
  # 环境变量会覆盖此处的配置
  api_key: null
  base_url: "https://api.deepseek.com"
  model: "deepseek-chat"

# 性能优化
performance:
  # 上下文长度
  num_ctx: 4096
  # GPU层数 (99=全部)
  num_gpu: 99

# 路由策略
routing:
  # 默认策略: auto, gpu, cpu, cloud
  default_strategy: "auto"
  # 复杂任务是否优先云端
  prefer_cloud_for_complex: true
  # 失败时是否自动降级
  auto_fallback: true
  # 全局降级链超时（秒），默认 180s；设为 0 表示不启用
  chain_timeout: 180
  # 全局最大并发请求数，超限时排队而非拒绝
  max_concurrent_requests: 10

# 日志
logging:
  level: "INFO"  # DEBUG, INFO, WARNING, ERROR
  show_latency: true
