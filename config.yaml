# Ollama Smart Router 配置文件

# 模型配置
models:
  # 小模型 - 用于简单任务 (GPU)
  small:
    name: "gemma3:4b"
    vram_gb: 3.0
    description: "轻量级模型，适合翻译、简单问答"
  
  # 中模型 - 用于中等任务 (CPU)
  medium:
    name: "qwen2.5:7b"  
    vram_gb: 6.0
    description: "平衡模型，适合代码、分析"
  
  # 大模型 - 用于复杂任务 (CPU Fallback)
  large:
    name: "llama3.2:8b"
    vram_gb: 7.0
    description: "强力模型，复杂推理"

# GPU阈值配置
gpu_thresholds:
  # 空闲显存低于此值转CPU
  min_free_vram_gb: 4.0
  # 安全余量
  safety_margin_gb: 1.0
  
# 云端API配置 (可选)
cloud:
  # API密钥 - 建议通过环境变量设置: export DEEPSEEK_API_KEY="your-key"
  api_key: null
  base_url: "https://api.deepseek.com"
  model: "deepseek-chat"
  # 备用配置
  alternatives:
    - name: "硅基流动"
      base_url: "https://api.siliconflow.cn/v1"
      model: "deepseek-ai/DeepSeek-V3"
    - name: "OpenRouter"
      base_url: "https://openrouter.ai/api/v1"
      model: "anthropic/claude-3.5-sonnet"

# 性能优化
performance:
  # 上下文长度
  num_ctx: 4096
  # CPU线程数 (0=自动使用全部线程)
  num_thread: 0
  # GPU层数 (99=全部)
  num_gpu: 99
  
# 路由策略
routing:
  # 默认策略: auto, gpu, cpu, cloud
  default_strategy: "auto"
  # 复杂任务是否优先云端
  prefer_cloud_for_complex: true
  # 失败时是否自动降级
  auto_fallback: true

# 日志
logging:
  level: "INFO"  # DEBUG, INFO, WARNING, ERROR
  show_routing_decision: true
  show_latency: true
